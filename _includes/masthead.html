{% include base_path %}

<button id="dark-mode-toggle" type="button" onclick="toggleDarkMode();return false;" aria-label="Toggle dark mode" style="position: fixed; top: 0.5em; right: 1em; z-index: 9999; padding: 0.5em 0.75em; border: 0; background-color: transparent; color: #ffffff; font-family: inherit; font-size: 0.9em; line-height: 1.2; cursor: pointer; height: auto; width: auto; display: inline-block; box-shadow: none; outline: none;">🌓 Dark mode</button>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
