{% include base_path %}

<button id="dark-mode-toggle" type="button" onclick="toggleDarkMode()" aria-label="Toggle dark mode" style="position: fixed; top: 12px; right: 16px; z-index: 9999; padding: 6px 14px; border: 1px solid rgba(255,255,255,0.5); border-radius: 6px; background-color: rgba(0,0,0,0.6); color: #ffffff; font-size: 14px; line-height: 1.2; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.25); height: auto; width: auto; display: inline-block;">🌓 Dark mode</button>

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
